# docker-compose.yml - NUC MediaMTX (RTSP→WebRTC 영상 중계 서버)
# 감지기가 송출한 RealSense 영상을 브라우저에 WebRTC로 전달한다.

services:
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: safety-mediamtx
    network_mode: host          # WebRTC UDP 포트 협상 위해 host 모드 권장
    volumes:
      - ./mediamtx.yml:/mediamtx.yml   # 위에서 만든 설정 파일 마운트
    restart: unless-stopped
